kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "cd /home/runner/workspace && python main.py"

[services.production]

[services.production.build]
args = ["echo", "no-build-step-for-python"]

[services.production.build.env]
PYTHONUNBUFFERED = "1"

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace && python main.py"]

[services.production.run.env]
PORT = "8080"
PYTHONUNBUFFERED = "1"

[services.production.health.startup]
path = "/api/healthz"
